<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Początek: {{TITLE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f6f1e8; --paper-raised:#efe7d7; --ink:#181310; --ink-soft:#4a4034;
  --cream:#f4ead6; --cream-dim:#cdbfa6;
  --ox:#8a1c2b; --ox-bright:#a8303f; --ox-deep:#4f0f18;
  --gold:#9a6712; --gold-bright:#c89233;
  --win:#1c5e46; --warn:#9a5a12;
  --line:#d8ccb6; --line-dark:rgba(244,234,214,.16);
  --z-nav:50;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
::selection{background:var(--ox);color:var(--cream)}
:focus-visible{outline:2px solid var(--ox);outline-offset:3px;border-radius:2px}
.masthead :focus-visible{outline-color:var(--gold-bright)}
.wrap{max-width:1080px;margin:0 auto;padding:0 28px}

/* ---- masthead (drench) ---- */
header.masthead{background:var(--ox);background:linear-gradient(157deg,var(--ox) 0%,var(--ox-deep) 100%);color:var(--cream);padding:30px 0 50px;position:relative;overflow:hidden}
header.masthead::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 80% at 85% -10%,rgba(200,146,51,.16),transparent 55%);pointer-events:none}
header.masthead .wrap{position:relative;z-index:1}
.masthead-rule{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.26em;text-transform:uppercase;color:var(--gold-bright);padding-bottom:22px;margin-bottom:34px;border-bottom:1px solid var(--line-dark);display:flex;flex-wrap:wrap;gap:12px;align-items:center}
.masthead-rule span{opacity:.5}
header.masthead h1{font-family:'Fraunces',serif;font-weight:900;font-size:clamp(40px,7vw,84px);line-height:.97;letter-spacing:-.025em;text-wrap:balance;max-width:16ch}
header.masthead h1 em{font-style:italic;color:var(--gold-bright);font-weight:400}
.h1en{font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.1em;color:var(--cream-dim);text-transform:uppercase;margin-top:14px}
header.masthead .scene{font-family:'Fraunces',serif;font-style:italic;font-size:clamp(17px,2.2vw,21px);line-height:1.45;color:var(--cream-dim);margin-top:20px;max-width:62ch}
.verdict{margin-top:26px;background:rgba(15,5,8,.30);border:1px solid var(--line-dark);border-radius:6px;padding:20px 24px;max-width:72ch;color:var(--cream);font-size:15px;line-height:1.58}
.verdict .vk{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-bright);display:block;margin-bottom:8px}
.verdict b{color:#fff}
.verdict p{margin:0}
.verdict .vjoin{margin-top:14px;padding-top:14px;border-top:1px solid var(--line-dark);color:var(--cream-dim)}
.verdict .vjoin-l{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-bright);display:block;margin-bottom:5px}

/* ---- contents nav ---- */
nav.contents{position:sticky;top:0;z-index:var(--z-nav);background:rgba(246,241,232,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
nav.contents .wrap{display:flex;gap:2px;overflow-x:auto}
.tab{flex:0 0 auto;background:none;border:none;font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--ink-soft);padding:17px 16px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .2s,border-color .2s}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--ox);border-bottom-color:var(--ox)}
.tab .n{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--gold);margin-right:7px}
.tab .star{color:var(--win);margin-left:6px}

.variant{display:none;padding:48px 0 78px;animation:fade .4s ease}
.variant.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.vhead{display:flex;align-items:baseline;justify-content:space-between;gap:14px;flex-wrap:wrap}
.vname{font-family:'Fraunces',serif;font-weight:900;font-size:clamp(26px,3.6vw,38px);letter-spacing:-.015em;line-height:1.05;text-wrap:balance}
.recbadge{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.08em;background:var(--win);color:#fff;padding:5px 11px;border-radius:3px;white-space:nowrap}
.vtech{font-size:15px;line-height:1.55;color:var(--ink-soft);margin:10px 0 4px}
.vmeta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);margin:10px 0 24px}

.prose{font-family:'Fraunces',serif;font-size:19px;line-height:1.78;background:var(--paper-raised);border:1px solid var(--line);border-radius:6px;padding:34px 38px;max-width:70ch}
.prose p{margin-bottom:18px}
.prose p:last-child{margin-bottom:0}
.hookline{background:var(--paper);border:1px solid var(--line);border-radius:5px;padding:14px 18px;font-size:14.5px;line-height:1.55;margin-top:18px;max-width:70ch}
.hookline b{color:var(--ox)}

.crit{margin-top:32px;display:grid;grid-template-columns:1fr 1fr;gap:32px;max-width:900px}
.crit h3{font-family:'Fraunces',serif;font-weight:600;font-size:18px;margin-bottom:14px}
.bars{display:grid;gap:9px}
.brow{display:grid;grid-template-columns:100px 1fr 28px;align-items:center;gap:12px}
.bn{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.03em;color:var(--ink-soft);text-transform:uppercase}
.bar{height:8px;background:var(--paper-raised);border:1px solid var(--line);border-radius:5px;overflow:hidden}
.fill{height:100%;width:0;background:var(--win);transition:width .9s cubic-bezier(.2,.8,.2,1)}
.bv{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;text-align:right}
.lists .lbl{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ox);display:block;margin:0 0 7px}
.lists ul{list-style:none;margin:0 0 18px}
.lists li{font-size:14.5px;line-height:1.5;margin-bottom:6px;padding-left:16px;position:relative}
.lists li::before{content:"·";position:absolute;left:3px;color:var(--gold);font-weight:700}
.vbadge{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:3px 10px;border-radius:3px;color:#fff}
.vbadge.PASS{background:var(--win)}.vbadge.FIX{background:var(--warn)}
.conflicts{margin-top:20px;background:rgba(138,28,43,.07);border:1px solid rgba(138,28,43,.32);border-radius:5px;padding:14px 18px;font-size:14px;line-height:1.55;max-width:70ch}
.conflicts b{color:var(--ox)}
@media(max-width:640px){.crit{grid-template-columns:1fr}.prose{padding:24px 22px}}

footer{border-top:1px solid var(--ink);padding:30px 0 64px;margin-top:20px}
footer .wrap{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.04em;color:var(--ink-soft)}

@media(prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  *,.variant{animation:none!important}
  *{transition:none!important}
}
</style>
</head>
<body>

<header class="masthead">
  <div class="wrap">
    <div class="masthead-rule">Mocny początek <span>/</span> {{GENRE}}</div>
    <h1 id="booktitle">{{TITLE}}</h1>
    <div class="h1en" id="booken"></div>
    <div class="scene" id="scene"></div>
    <div class="verdict" id="verdict"></div>
  </div>
</header>

<nav class="contents"><div class="wrap" id="tabs"></div></nav>

<div id="variants"></div>

<footer>
  <div class="wrap">
    Mocny początek &bull; {{GENRE}} &bull; przygotowany wieloagentowym procesem w Claude Code
  </div>
</footer>

<script>
const DATA = /*__INJECT_DATA__*/ null;
const $=s=>document.querySelector(s);
const m=DATA.meta||{};

$('#booktitle').textContent=m.title||'';
$('#booken').textContent=m.en?('oryg. „'+m.en+'”'):'';
$('#scene').textContent=m.scene?('Pierwsza scena: '+m.scene):'';
const w=DATA.werdykt||{};
$('#verdict').innerHTML='<span class="vk">Werdykt</span>'
  +'<p class="vbody"><b>Rozwijać: '+(nameOf(w.recommended)||'—')+'.</b> '+(w.uzasadnienie||'')+'</p>'
  +(w.jak_polaczyc?('<p class="vjoin"><span class="vjoin-l">Jak połączyć</span>'+w.jak_polaczyc+'</p>'):'');

function nameOf(key){const v=(DATA.variants||[]).find(x=>x.key===key);return v?v.nazwa:key}
function paras(t){return (t||'').split(/\n\s*\n/).map(p=>'<p>'+p.trim().replace(/\s*\n\s*/g,' ')+'</p>').join('')}

const tabs=$('#tabs'), vars=$('#variants');
(DATA.variants||[]).forEach((v,i)=>{
  const star=v.recommended?'<span class="star">★</span>':'';
  tabs.insertAdjacentHTML('beforeend',
    `<button class="tab${i===0?' active':''}" data-v="${v.key}"><span class="n">0${i+1}</span>${v.nazwa}${star}</button>`);
  const c=v.critique||{}, sc=c.scores||{}, cont=v.ciaglosc||{};
  const bars=['hook','glos','immersja','pov','tempo'].map(k=>`
    <div class="brow"><span class="bn">${k}</span><div class="bar"><div class="fill" data-w="${(sc[k]||0)*20}"></div></div><span class="bv">${sc[k]||'–'}</span></div>`).join('');
  const konf=Array.isArray(cont.konflikty)?cont.konflikty:[];
  const conflicts=(cont.ok===false && konf.length)
    ? `<div class="conflicts"><b>Konflikty z kanonem:</b> ${konf.join('; ')}</div>` : '';
  vars.insertAdjacentHTML('beforeend', `
    <section class="variant${i===0?' active':''}${v.recommended?' rec':''}" id="v-${v.key}">
      <div class="wrap">
        <div class="vhead"><div class="vname">${v.nazwa}</div>${v.recommended?'<span class="recbadge">REKOMENDOWANY</span>':''}</div>
        <div class="vtech">${v.opis_techniki||''}</div>
        <div class="vmeta">${v.words||'?'} słów &bull; ocena bramki: <span class="vbadge ${c.verdict||'FIX'}">${c.verdict||'—'}</span></div>
        <div class="prose">${paras(v.text)}</div>
        ${v.hook?`<div class="hookline"><b>Haczyk:</b> ${v.hook}</div>`:''}
        <div class="crit">
          <div><h3>Ocena fabularna</h3><div class="bars">${bars}</div></div>
          <div class="lists">
            <span class="lbl">Mocne</span><ul>${(c.mocne||[]).map(x=>`<li>${x}</li>`).join('')||'<li>—</li>'}</ul>
            <span class="lbl">Słabe</span><ul>${(c.slabe||[]).map(x=>`<li>${x}</li>`).join('')||'<li>—</li>'}</ul>
          </div>
        </div>
        ${conflicts}
      </div>
    </section>`);
});

requestAnimationFrame(()=>setTimeout(()=>document.querySelectorAll('.fill').forEach(f=>f.style.width=f.dataset.w+'%'),60));

document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.variant').forEach(x=>x.classList.remove('active'));
  t.classList.add('active'); document.getElementById('v-'+t.dataset.v).classList.add('active');
  window.scrollTo({top:0,behavior:'instant'});
}));
</script>
</body>
</html>
